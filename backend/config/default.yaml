# Multi-View RAG Configuration
# All weights, thresholds, and settings are configurable here
#
# IMPORTANT: Secrets (API keys, passwords) are in .env, NOT here.
# This file can be committed to version control.

retrieval:
  dense_channel:
    top_k: 200
    similarity_threshold: 0.3
    index_name: "chunk_embedding_index"

  graph_channel:
    # Hybrid Eurovoc matching (lexical + semantic)
    lexical_keywords_min_match: 1
    semantic_similarity_threshold: 0.4
    max_acts_per_query: 100
    # Post-traversal chunk-level filter: discard chunks whose embedding
    # similarity to the query is below this threshold. Prevents off-topic
    # chunks from being included just because their speaker co-signed a
    # relevant parliamentary act.
    chunk_similarity_threshold: 0.3

  merger:
    # NOTE: authority_weight is minimal because authority is computed POST-retrieval
    # (the merger runs before AuthorityScorer). Real authority ranking happens
    # in pipeline.py _group_evidence_by_party (speaker-first interleaving).
    # The freed weight is redistributed to relevance and salience.
    diversity_weight: 0.15     # Penalize same-speaker dominance
    coverage_weight: 0.20      # Reward party coverage
    authority_weight: 0.05     # Token value — scorer not yet available at merge time
    relevance_weight: 0.35     # Primary signal: embedding similarity to query
    salience_weight: 0.25      # Prefer politically substantive chunks over procedural text

authority:
  weights:
    # Semantic signals (topic-specific, highest quality):
    profession: 0.15   # Cosine sim query ↔ profession embedding  [was 0.10]
    education: 0.10    # Cosine sim query ↔ education embedding
    committee: 0.25    # Cosine sim query ↔ committee embedding    [was 0.20]
    # Activity signals (count-based, not topic-filtered):
    acts: 0.20         # Weighted act count (time-decayed)         [was 0.25]
    interventions: 0.25 # Weighted speech count (time-decayed)     [was 0.30]
    # Structural signal:
    role: 0.05         # Institutional role (president/VP/secretary)

  time_decay:
    # Acts represent durable legislative commitment — longer half-life
    acts_half_life_days: 548      # 18 months  [was 365: 2yr-old acts kept 25% → now 41%]
    speeches_half_life_days: 180  # 6 months (speeches are more ephemeral)

  # Minimum cosine similarity between act description_embedding and the query
  # embedding for an act to be counted. Acts below this threshold are off-topic
  # and do not contribute to the authority score.
  # text-embedding-3-small typical range for related content: 0.25–0.60
  acts_relevance_threshold: 0.25

  # Minimum cosine similarity between speech text_embedding and the query
  # embedding for a speech to be counted.
  # Speech embeddings are computed by build/precalculate_embeddings.py Phase 5
  # (first 2000 chars of preprocessed speech text).
  interventions_relevance_threshold: 0.25

  normalization: "percentile"
  # Cap individual component contributions
  max_component_contribution: 0.8

# SOFT ideological anchors - fully configurable
# These are guidelines for multi-view coverage, NOT hard classifications
compass:
  purpose: "multi-view coverage"  # NOT ideology discovery

  anchors:
    enabled: false  # Set to true to enable soft anchors for axis orientation
    left:
      groups:
        - "Alleanza Verdi e Sinistra"
        - "Partito Democratico - Italia Democratica e Progressista"
      confidence: 0.8

    center:
      groups:
        - "Azione - Popolari Europeisti Riformatori - Renew Europe"
        - "Italia Viva - Il Centro - Renew Europe"
        - "Noi Moderati (Noi con l'Italia, Coraggio Italia, UDC e Italia al Centro) - MAIE - Centro Popolare"
      confidence: 0.6

    right:
      groups:
        - "Fratelli d'Italia"
        - "Lega - Salvini Premier"
        - "Forza Italia - Berlusconi Presidente - PPE"
      confidence: 0.8

  # Ambiguous groups - position configurable based on research needs
  ambiguous:
    "Movimento 5 Stelle":
      default_position: "left"
      confidence: 0.5
      note: "Position contested - configurable"

  # Groups without default ideological position
  unclassified:
    - "Misto"

  clustering:
    min_fragments_for_kde: 3
    kde_bandwidth: "scott"  # or numeric value

  # Weighted PCA parameters (IC-1)
  max_weight_per_fragment: 0.05  # Clip max weight to prevent single-group dominance

  # Dimensionality decision (IC-1)
  pc2_pc1_ratio_threshold: 0.40  # If PC2/PC1 < 0.40, use 1D mode
  min_variance_explained: 0.05   # Refuse analysis if total variance < 5%

  # Projection parameters (IC-2)
  z_score_clip_threshold: 4.0    # Soft clip Z-scores beyond ±4σ
  scr_confidence_threshold: 0.15 # Filter fragments with SCR < 0.15

  # Axis labeling parameters (IC-6)
  tfidf_top_terms: 3             # Number of top TF-IDF terms for label
  pole_purity_threshold: 0.30    # Minimum pole coherence

  # Visualization parameters
  scatter_sample_size: 200       # Max points in scatter plot
  scatter_random_seed: 42        # Fixed seed for reproducibility

generation:
  # OpenAI models for 4-stage pipeline
  # NOTE: This system uses OpenAI, NOT Claude/Anthropic at runtime
  models:
    analyst: "gpt-4o-mini"  # Stage 1: Claim decomposition
    writer: "gpt-4o"        # Stage 2: Sectional writing
    integrator: "gpt-4o"    # Stage 3: Narrative integration
    # Stage 4 (Citation Surgeon) is deterministic, no LLM needed

  parameters:
    max_tokens: 4000
    temperature: 0.3
    top_p: 1.0

  # Position brief: provides group-level context to the sectional writer
  # so citations are selected consistently with the group's overall stance
  position_brief:
    enabled: true
    max_chunks: 5          # Top N chunks to include in brief
    chars_per_chunk: 400   # Max chars per chunk in the brief
    context_chars: 500     # Context chars shown per evidence item

  # All 10 parties must have sections
  require_all_parties: true
  no_evidence_message: "Nel corpus analizzato non risultano interventi rilevanti su questo tema."

  # Enable convergence-divergence synthesis section (Stage 3.5)
  # Adds "Analisi Trasversale" section identifying cross-party patterns
  enable_synthesis: true

# Coalition definitions for temporal authority logic
# CRITICAL: Coalition crossing (maggioranza <-> opposizione) invalidates prior authority
coalitions:
  maggioranza:
    - "Fratelli d'Italia"
    - "Lega - Salvini Premier"
    - "Forza Italia - Berlusconi Presidente - PPE"
    - "Noi Moderati (Noi con l'Italia, Coraggio Italia, UDC e Italia al Centro) - MAIE - Centro Popolare"

  opposizione:
    - "Partito Democratico - Italia Democratica e Progressista"
    - "Movimento 5 Stelle"
    - "Alleanza Verdi e Sinistra"
    - "Azione - Popolari Europeisti Riformatori - Renew Europe"
    - "Italia Viva - Il Centro - Renew Europe"
    - "Misto"

# Citation extraction settings
citation:
  # ONLY offset-based extraction allowed
  method: "offset"  # NO fuzzy matching
  format: "«{quote}» [{speaker}, {party}, {date}, ID:{id}]"
  # Validation: re-extract must match stored quote_text
  verify_on_insert: true
  # Semantic dedup threshold (cosine similarity, MMR-inspired)
  # Citations with similarity > threshold are considered duplicates
  dedup_similarity_threshold: 0.85

  # Citation integrity system settings
  integrity:
    # Minimum semantic coherence score (0.0-1.0)
    # For embedding method: 0.35 calibrated for intro_text vs verbatim parliamentary quote pairs
    # For jaccard method: 0.2 recommended (keyword overlap)
    min_coherence_score: 0.35
    # Coherence validation method: "embedding" (primary) or "jaccard" (fallback)
    coherence_method: "embedding"

# Query rewriting: expand short/ambiguous queries before retrieval
query_rewriting:
  enabled: true
  model: "gpt-4o-mini"
  # Only rewrite queries with at most this many words.
  # Longer queries are already descriptive enough.
  max_query_words: 5

# LLM provider configuration
llm:
  # Embedding model
  embedding_model: "text-embedding-3-small"
